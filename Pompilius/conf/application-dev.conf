include "application.conf"

logAllExceptions = true
useSSL = true

play {
  http {
    session = {
      secure = true,
      sameSite = "None",
    }
  }
}

countries {
  allowCountryOverride = true
}

eagerSingletons {
  enabled = [
    "dev.tnr.elback.shared.infrastructure.actors.HeartbeatActorSupervisor",
    //No creo sea necesario este.
    "dev.tnr.elback.shared.infrastructure.repositories.slack.AlertSlackRepository",
  ]
}

emails {
  domains {
    blacklist = "https://raw.githubusercontent.com/disposable-email-domains/disposable-email-domains/master/disposable_email_blocklist.conf"
  }
}

sendgrid {
  enabled = true
}

//Mirar esto
auth {
  resetPasswordUrl = "https://pompilius.dev/password/reset"
}

