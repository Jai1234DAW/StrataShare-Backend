# https://www.playframework.com/documentation/latest/Configuration
include "application-local.conf"
environment=${?ENVIRONMENT}
nodeId=${?NODE_ID}
nodes=[${?NODE_ID}]
logAllExceptions = true

baseUrl=${?BASE_URL}
baseUrlAppDeployment=${?BASE_URL_APP_DEPLOYMENT}

useSSL = ${?USE_SSL}

custom-execution-contexts{
 database{
    executor="thread-pool-executor"
    throughput=1
    thread-pool-executor{
    fixed-pool-size=5
    }
 }
}


  play{
    http{
        secret.key=${?SECRET_KEY}
        errorHandler="dev.pompilius.shared.infrastructure.ErrorHandler"
        // errorHandler="play.api.http.JsonHttpErrorHandler"
        filters="dev.pompilius.shared.infrastructure.filters.Filters"

        session={
            cookieName="pompilius"
            httpOnly=true,
            maxAge=30 days
            secure=true
            sameSite="None"
        }

        parser.maxDiskBuffer=200 MB
    }

    filters{
        disabled+=play.filters.csrf.CSRFFilter
        disabled+=play.filters.hosts.AllowedHostsFilter
        enabled+=play.filters.cors.CORSFilter
        disabled+=play.filters.headers.SecurityHeadersFilter
    }


play.filters.cors {
  pathPrefixes = ["/api"]
  allowedOrigins = ["http://localhost:5500", "http://127.0.0.1:5500", "https://chimerical-arithmetic-26f21f.netlify.app"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders  = ["Accept", "Content-Type", "Origin", "Authorization", "X-Requested-With"]
  supportsCredentials = true
}
    modules{
    # Scalikejdbc
        enabled+="dev.pompilius.shared.infrastructure.EagerSingletons"
    }

    db {
        pool = "hikaricp"
        prototype {
          pool = "hikaricp"
          driver = "com.mysql.cj.jdbc.Driver"
          logSql = false
          hikaricp {
            connectionTimeout = 30 seconds
            # Configure idleTimeout and maxLifeTime settings to be one minute less than the wait_timeout (20 minutes)
            maxLifetime = 19 minutes
            connectionTestQuery = null
            maximumPoolSize = ${custom-execution-contexts.database.thread-pool-executor.fixed-pool-size}
            initializationFailTimeout = 1
            autoCommit = true

            # leakDetectionThreshold = 2000
            dataSource {
              useLegacyDatetimeCode = false
              useUnicode = true
              useSSL = false
              characterEncoding = UTF-8
            }
          }
        }
      }

      evolutions{
        enabled=true
        autoApply=true
        autoApplyDowns=false
        db{
            default{
                enabled=true
                autoApply=true
                autoApplyDowns=false
          }
        }
      }

    ws{
        ahc.useCookieStore=false
    }

    i18n.langs=["en", "es"]

# Close play configuration
}

eagerSingletons {
  enabled = []
  disabled = []
}

# Database configuration
# ~~~~~
db {
  default {
    url = ${?JDBC_DATABASE_URL}
    username=${?JDBC_DATABASE_USERNAME}
    password=${?JDBC_DATABASE_PASSWORD}

    hikaricp {
      dataSource {
        cachePrepStmts = true
        prepStmtCacheSize = 250
        prepStmtCacheSqlLimit = 2048
        useServerPrepStmts = true
        useLocalSessionState = true
        useLocalTransactionState = false
        // useLocalTransactionState = true
        rewriteBatchedStatements = true
        cacheResultSetMetadata = true
        cacheServerConfiguration = true
        elideSetAutoCommits = true
        maintainTimeStats = false
      }
    }
  }
}

scalikejdbc.global {
  loggingSQLErrors = true
  loggingSQLAndTime.enabled = true
  loggingSQLAndTime.singleLineMode = false
  loggingSQLAndTime.logLevel = debug
  loggingSQLAndTime.warningEnabled = true
  loggingSQLAndTime.warningThresholdMillis = 200
  loggingSQLAndTime.warningLogLevel = warn
}

context {
  parameters = {}
}

countries {
  featured = ["ES"]
  allowCountryOverride = false
}

auth {
  resetLinkDuration = 2 minutes
  resetPasswordUrl = ${?RESET_PASSWORD_URL}

  maxRequest = 15
  timeWindow = 1 minute
  maxAge=24 hours
  windowDuration = 1 minute
  allowLoginWithoutRoles=false
  maxLoginAttempts = 5
}

barter {
    requestLinkDuration = 3 days
    purchaseResourceUrl = ${?PURCHASE_RESOURCE_URL}
}

stripe {
    # Modo sandbox (true = test/desarrollo, false = producciÃ³n)
    sandbox = true

    # Claves de API de Stripe (usar claves de test en desarrollo)
    secretKey=${?STRIPE_SECRET_KEY}
    publishableKey=${?STRIPE_PUBLISHABLE_KEY}

    # Secret para validar webhooks
    # Para obtenerlo: https://dashboard.stripe.com/test/webhooks
    webhookSecret=${?STRIPE_WEBHOOK_SECRET}

    # URL base de la API (cambiar si se usa Stripe Connect u otra regiÃ³n)
    apiUrl = "https://api.stripe.com/v1"
    currency="EUR"
}


attachments {
  #path="C:/Users/JainethEstherGalicia/tmp/strataShare/attachments"
  path=${user.home}"/tmp/strataShare/attachments"
 #path = "/tmp/strataShare/attachments"
  tokenValidity = 15 minutes
  avatars {
    maxWidth = 512
    maxHeight = 512
  }
}

cache {
  enabled = true
  duration = 1 minute
}

users {
  validateMailLinkDuration = 1 day
  validateMailUrl = "http://change.me/validateMail"
  changeMailLinkDuration = 1 day
  changeMailUrl = "http://change.me/changeMail"
}

# Valores por defecto para los endpoint limitados
rateLimit {
  maxRequest = 100
  timeWindow = 1 minute
}

mails {
  domains {
    # blacklist = "https://raw.githubusercontent.com/disposable-email-domains/disposable-email-domains/master/disposable_email_blocklist.conf"
    blacklist = "/disposable_email_blocklist.conf"
    whitelist = ["stratashare.com", "stratashare.es"]
  }

  allowDisposableMails = false
  allowAlias = false

  tokenSecretKey=${?MAIL_TOKEN_SECRET_KEY}

  sendEmailQueue {
    initialDelay = 1 seconds
    interval = 500 milliseconds
  }
}

mail {
    host = "smtp.gmail.com"
    smtpPort = 587
    sslSmtpPort = null
    username=${?USERNAME_MAIL}
    password=${?MAIL_PASSWORD}
    setSslOnConnect = false
    sslCheckServerIdentity = true
    startTlsEnabled = true
    startTlsRequired = null
    from {
      name = "StrataShare"
      address = "sharestrata@gmail.com"
    }
    replyTo {
      name = "StrataShare"
      address = "sharestrata@gmail.com"
    }
}

//Hacer Variables de entorno aquÃ­, para estos valores
payments{
   paymentCompletedUrl = "http://localhost:5500/pages/transactions/payment-success.html?sellerId=${sellerId}&resourceId=${resourceId}"
   paymentCompletedUrl = ${?PAYMENT_COMPLETED_URL}
   paymentCanceledUrl = "http://localhost:5500/pages/transactions/payment-cancel.html?sellerId=${sellerId}&resourceId=${resourceId}"
   paymentCanceledUrl = ${?PAYMENT_CANCELED_URL}
    currency="EUR",
    defaultFee = 10.0,
    # ComisiÃ³n de la plataforma (5%) - La paga el vendedor
    feeOwnPlatform = 0.05
}

# Surcharge de Stripe - Configurado a 0 para que el comprador NO pague fee adicional
# El vendedor absorbe el costo de Stripe (aprox 2.9% + 0.30â‚¬)
gatewaySurcharges{
    stripeSurchargePercentage = 0.00,
    stripeSurchargeFixed = 0.00
}




