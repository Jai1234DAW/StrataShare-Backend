# https://www.playframework.com/documentation/latest/Configuration

environment="local"
nodeId=0
nodes=[${nodeId}]
baseUrl="http://localhost:9000"
useSSL=false

custom-execution-contexts{

 database{
    executor="thread-pool-executor"
    throughput=1
